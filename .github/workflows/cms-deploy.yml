name: CMS Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Process CMS images (WebP variants)
        run: node ../../cms/scripts/process-images.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch CMS data from Supabase
        run: node ../../cms/scripts/codegen.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: npm run build

      - name: Track build output for incremental deploy
        run: git add -f apps/web/.out/
        working-directory: ./

      # ── DEPLOY via lftp (FTPS) ────────────────────────────────
      # lftp handles Hostinger's TLS negotiation better than FTP action.
      # Revert comment above if this also fails.
      - name: Deploy via lftp
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-allow on;
            set ftp:ssl-force on;
            set ftp:ssl-protect-data on;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.HOSTINGER_SFTP_USER }}','${{ secrets.HOSTINGER_SFTP_PASSWORD }}' ftps://${{ secrets.HOSTINGER_SFTP_HOST }};
            mirror -R --delete --parallel=5 apps/web/.out/ /public_html/;
          "
        working-directory: ./
