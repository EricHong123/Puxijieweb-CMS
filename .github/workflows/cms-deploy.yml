name: CMS Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Process CMS images (WebP variants)
        run: node ../../cms/scripts/process-images.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch CMS data from Supabase
        run: node ../../cms/scripts/codegen.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: npm run build

      - name: Track build output for incremental deploy
        run: git add -f apps/web/.out/
        working-directory: ./

      # ── DEPLOY via SSH rsync ──────────────────────────────────
      # FTP fallback (revert if SSH fails):
      #   uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      #   server:     ${{ secrets.HOSTINGER_SFTP_HOST }}
      #   username:   ${{ secrets.HOSTINGER_SFTP_USER }}
      #   password:   ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
      #   local-dir:  apps/web/.out/
      #   server-dir: /public_html/
      #   protocol:   ftp  /  port: 21  /  dangerous-clean-slate: true
      - name: Deploy via SSH (rsync)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/web/.out/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/public_html/"
        working-directory: ./
