name: CMS Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Process CMS images (WebP variants)
        run: node ../../cms/scripts/process-images.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch CMS data from Supabase
        run: node ../../cms/scripts/codegen.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: npm run build

      - name: Track build output for incremental deploy
        run: git add -f apps/web/.out/
        working-directory: ./

      # ── Network diag ──────────────────────────────────────────
      - name: Test connectivity to Hostinger
        run: |
          echo "=== ping ==="
          ping -c 3 -W 5 ${{ secrets.HOSTINGER_SFTP_HOST }} || true
          echo "=== port 21 ==="
          timeout 10 bash -c "echo >/dev/tcp/${{ secrets.HOSTINGER_SFTP_HOST }}/21" && echo "21 OPEN" || echo "21 TIMEOUT"
          echo "=== port 22 ==="
          timeout 10 bash -c "echo >/dev/tcp/${{ secrets.HOSTINGER_SFTP_HOST }}/22" && echo "22 OPEN" || echo "22 TIMEOUT"
        working-directory: ./

      # ── DEPLOY via lftp (plain FTP, no TLS) ──────────────────
      - name: Deploy via lftp (plain FTP)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-allow off;
            set net:timeout 30;
            set net:max-retries 2;
            open -u '${{ secrets.HOSTINGER_SFTP_USER }}','${{ secrets.HOSTINGER_SFTP_PASSWORD }}' ${{ secrets.HOSTINGER_SFTP_HOST }};
            mirror -R --delete --parallel=3 apps/web/.out/ /public_html/;
          "
        working-directory: ./
