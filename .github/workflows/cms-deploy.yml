name: CMS Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Process CMS images (WebP variants)
        run: node ../../cms/scripts/process-images.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch CMS data from Supabase
        run: node ../../cms/scripts/codegen.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        id: deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_SFTP_HOST }}
          username: ${{ secrets.HOSTINGER_SFTP_USER }}
          password: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          local-dir: apps/web/.out/
          server-dir: ./
          protocol: ftps
          dangerous-clean-slate: true

      - name: Send success notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[CMS] Deploy succeeded — puxijietech.com"
          to: admin@puxijietech.com
          from: CMS Deploy Bot
          body: |
            CMS deployment to Hostinger completed successfully at ${{ github.event.head_commit.timestamp || 'manual trigger' }}.

            Commit: ${{ github.event.head_commit.message || 'manual dispatch' }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[CMS] Deploy FAILED — puxijietech.com"
          to: admin@puxijietech.com
          from: CMS Deploy Bot
          priority: high
          body: |
            CMS deployment to Hostinger FAILED.

            Commit: ${{ github.event.head_commit.message || 'manual dispatch' }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Check the workflow logs for details.
