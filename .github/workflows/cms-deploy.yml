name: CMS Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Process CMS images (WebP variants)
        run: node ../../cms/scripts/process-images.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch CMS data from Supabase
        run: node ../../cms/scripts/codegen.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: npm run build

      - name: Track build output for incremental deploy
        run: git add -f apps/web/.out/
        working-directory: ./

      - name: Deploy to Hostinger via lftp SFTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 3
          open -u ${{ secrets.HOSTINGER_SFTP_USER }},'${{ secrets.HOSTINGER_SFTP_PASSWORD }}' sftp://${{ secrets.HOSTINGER_SFTP_HOST }}
          mirror -R -e --delete --verbose apps/web/.out/ /public_html/
          "
        working-directory: ./
