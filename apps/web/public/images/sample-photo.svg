<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Sample photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.25">
    <circle cx="260" cy="220" r="140" fill="#38bdf8"/>
    <circle cx="1420" cy="160" r="180" fill="#a78bfa"/>
    <circle cx="1240" cy="820" r="210" fill="#34d399"/>
  </g>

  <rect x="140" y="170" width="1320" height="560" rx="36" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.14"/>

  <g fill="#ffffff">
    <text x="800" y="410" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="56" font-weight="700" text-anchor="middle" opacity="0.92">
      Sample Photo
    </text>
    <text x="800" y="475" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="24" font-weight="500" text-anchor="middle" opacity="0.72">
      Replace this file with your real image at
    </text>
    <text x="800" y="520" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace" font-size="22" font-weight="600" text-anchor="middle" opacity="0.80">
      /images/sample-photo.svg
    </text>
  </g>

  <g opacity="0.35" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6">
    <path d="M210 650 L460 430 L650 560 L820 380 L1030 520 L1210 420 L1390 650" fill="none"/>
  </g>
</svg>
